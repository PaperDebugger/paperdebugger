---
apiVersion: v1
kind: Secret
metadata:
    name: tunnel-token
    namespace: {{ .Values.namespace }}
type: Opaque
data:
    token: {{ .Values.cloudflare_tunnel_token | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared-deployment
  namespace: {{ .Values.namespace }}
spec:
  replicas: 2
  selector:
    matchLabels:
      pod: cloudflared
  template:
    metadata:
      labels:
        pod: cloudflared
    spec:
      {{- with .Values.cloudflareNodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        sysctls:
        # Allows ICMP traffic (ping, traceroute) to resources behind cloudflared.
          - name: net.ipv4.ping_group_range
            value: "65532 65532"
      containers:
        - image: {{ .Values.cloudflared.image }}
          name: cloudflared
          env:
            # Defines an environment variable for the tunnel token.
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tunnel-token
                  key: token
          command:
            # Configures tunnel run parameters
            - cloudflared
            - tunnel
            - --no-autoupdate
            - --protocol
            - http2
            - --loglevel
            - info
            - --metrics
            - 0.0.0.0:2000
            - run
          resources:
            {{- toYaml .Values.cloudflared.resources | nindent 12 }}
          # cloudflared's /ready returns 200 only when at least one tunnel
          # connection is active. Cloudflare rotates edge connections
          # periodically, so transient /ready failures are expected and
          # cloudflared reconnects on its own. We therefore drop livenessProbe
          # (which was killing healthy pods on every reconnect) and rely on
          # startupProbe for first-connect tolerance plus readinessProbe for
          # rolling-deploy gating.
          startupProbe:
            httpGet:
              path: /ready
              port: 2000
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 2000
            periodSeconds: 10
            failureThreshold: 3
